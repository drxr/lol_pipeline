name: LoL Pipeline → Supabase

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      league:
        description: "Лига (challenger / grandmaster / master)"
        required: false
        default: "challenger"
      region:
        description: "Регион (euw1, na1, kr …)"
        required: false
        default: "euw1"
      matches:
        description: "Матчей на игрока"
        required: false
        default: "20"
      depth:
        description: "Глубина графа"
        required: false
        default: "1"
      skip_pg:
        description: "Пропустить загрузку в PostgreSQL? (true/false)"
        required: false
        default: "false"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Если секрет добавлен в Environment — раскомментируй строку ниже
    # и замени "production" на имя своего Environment в GitHub
    # environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Диагностика: проверяем что секрет доступен ──────────────────────
      # Если видишь "RIOT_API_KEY: [NOT SET]" — секрет не передаётся в job
      - name: Check secrets availability
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          if [ -z "$RIOT_API_KEY" ]; then
            echo "RIOT_API_KEY: [NOT SET] — проверь настройки секрета в GitHub"
            echo ""
            echo "Возможные причины:"
            echo "  1. Секрет добавлен в Environment, а не Repository"
            echo "     → Settings → Secrets → Actions → Repository secrets"
            echo "  2. Опечатка в названии секрета (чувствительно к регистру)"
            echo "     → Должно быть ровно: RIOT_API_KEY"
            exit 1
          else
            echo "RIOT_API_KEY: [SET, length=${#RIOT_API_KEY}]"
          fi

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: lol-data-${{ github.ref_name }}-${{ runner.os }}
          restore-keys: |
            lol-data-${{ github.ref_name }}-
            lol-data-

      # ── ETL ──────────────────────────────────────────────────────────────
      - name: Run ETL pipeline
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          python main.py \
            --league  "${{ github.event.inputs.league  || 'challenger' }}" \
            --region  "${{ github.event.inputs.region  || 'euw1' }}" \
            --matches "${{ github.event.inputs.matches || '20' }}" \
            --depth   "${{ github.event.inputs.depth   || '1' }}"

      # ── Загрузка в Supabase ──────────────────────────────────────────────
      - name: Load to Supabase PostgreSQL
        if: ${{ github.event.inputs.skip_pg != 'true' }}
        env:
          PG_HOST:     ${{ secrets.PG_HOST }}
          PG_PORT:     ${{ secrets.PG_PORT }}
          PG_DB:       ${{ secrets.PG_DB }}
          PG_USER:     ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        run: |
          python main.py --pg-load-only

      - name: Save data cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/
          key: lol-data-${{ github.ref_name }}-${{ runner.os }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lol-pipeline-run-${{ github.run_number }}
          path: |
            data/processed/
            etl.log
          retention-days: 7
